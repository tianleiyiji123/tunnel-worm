# ============================================================
# Tunnel Worm - 单镜像部署（推荐）
# 用法: docker compose up -d
# 首次启动访问 http://localhost:7895 进入安装向导
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - VERSION=1.0.0
        - BUILD_DATE=unknown
    image: tianleiyiji123/tunnel-worm:latest
    container_name: tunnel-worm
    restart: unless-stopped
    ports:
      - "7895:7895"
    volumes:
      - tunnel-worm_data:/app/data
    environment:
      # ---- 数据目录（一般不需要修改） ----
      - DATA_DIR=/app/data

      # ---- 以下为应用参数（可选，有默认值） ----
      # 数据库和存储配置请通过安装向导（Web UI）完成，
      # 也可通过环境变量预设（安装向导 config.json 优先级更高）
      #
      # - TRANSFER_EXPIRE_HOURS=24
      # - MAX_FILE_SIZE_MB=50
      # - MAX_FILES_PER_TRANSFER=10
      # - MAX_FAIL_ATTEMPTS=5
      # - LOCK_DURATION_MINUTES=1
      # - JWT_EXPIRE_HOURS=168

  # ---- 可选：MinIO 对象存储 ----
  # 取消下方注释并在安装向导中选择 MinIO
  # minio:
  #   image: minio/minio:latest
  #   container_name: tunnel-worm-minio
  #   restart: unless-stopped
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   command: server /data --console-address ":9001"

volumes:
  tunnel-worm_data:
  # minio_data:

version: '3.8'

# ============================================================
# 隧隧虫 - 单镜像部署（推荐）
# 用法: docker run -p 80:80 -v suisuichong_data:/app/data suisuichong
# 首次启动访问 http://localhost 进入安装向导
# ============================================================

services:
  # ---- 单镜像模式（推荐，Docker Hub 发布方式） ----
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: suisuichong
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - suisuichong_data:/app/data
    environment:
      - DATA_DIR=/app/data

  # ---- 可选：MinIO 对象存储 ----
  # 取消下方注释并在安装向导中选择 MinIO
  # minio:
  #   image: minio/minio:latest
  #   container_name: suisuichong-minio
  #   restart: unless-stopped
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   command: server /data --console-address ":9001"

volumes:
  suisuichong_data:
  # minio_data:
